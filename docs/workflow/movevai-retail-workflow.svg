<svg width="680" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" font-family="Sarabun, sans-serif">
  <style>
    text { font-family: 'Sarabun', sans-serif; }
    .th { font-size: 15px; font-weight: 600; }
    .ts { font-size: 13px; font-weight: 400; }
    .lg { font-size: 12px; font-weight: 400; fill: #2C2C2A; }
    .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="600" fill="#ffffff"/>

  <text class="th" x="40" y="28" fill="#2C2C2A" font-size="17">ภาพรวม Workflow การทำงานของ MoveVai Retail</text>
  <text class="ts" x="40" y="48" fill="#5F5E5A">รับออเดอร์ → ตรวจสอบ → จัดส่ง → ปิดงาน | ลูกค้าติดตามสถานะได้เอง</text>

  <rect x="430" y="14" width="11" height="11" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text class="lg" x="446" y="23">ระบบ / ช่องทางรับงาน</text>
  <rect x="556" y="14" width="11" height="11" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text class="lg" x="572" y="23">คนขับ</text>
  <rect x="430" y="32" width="11" height="11" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="lg" x="446" y="41">ทีมแอดมิน</text>
  <rect x="556" y="32" width="11" height="11" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text class="lg" x="572" y="41">ลูกค้า</text>

  <rect x="40" y="80" width="440" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text class="th" x="260" y="104" text-anchor="middle" fill="#444441">1 · รับออเดอร์จากหลายช่องทาง</text>
  <text class="ts" x="260" y="123" text-anchor="middle" fill="#5F5E5A">LINE · แชตภายใน · ไฟล์/สคริปต์ · คีย์มือ</text>
  <line class="arr" x1="260" y1="136" x2="260" y2="160" marker-end="url(#arrow)"/>

  <rect x="40" y="160" width="440" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="th" x="260" y="184" text-anchor="middle" fill="#085041">2 · ตรวจสอบและยืนยันข้อมูล</text>
  <text class="ts" x="260" y="203" text-anchor="middle" fill="#0F6E56">เช็กข้อมูลลูกค้า ที่อยู่ และวิธีส่ง</text>

  <line class="arr" x1="260" y1="216" x2="260" y2="230"/>
  <path class="arr" d="M260 230 L145 230 L145 244" marker-end="url(#arrow)"/>
  <path class="arr" d="M260 230 L375 230 L375 244" marker-end="url(#arrow)"/>

  <rect x="40" y="244" width="210" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="th" x="145" y="268" text-anchor="middle" fill="#085041">3A · มอบหมายงานคนขับ</text>
  <text class="ts" x="145" y="287" text-anchor="middle" fill="#0F6E56">จัดคิว วางรอบ แล้วส่งเข้าแอป</text>
  <rect x="270" y="244" width="210" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="6 4"/>
  <text class="th" x="375" y="268" text-anchor="middle" fill="#085041">3B · ส่งผ่านไปรษณีย์ไทย</text>
  <text class="ts" x="375" y="287" text-anchor="middle" fill="#0F6E56">export รายการ + ใส่เลขพัสดุ</text>

  <line class="arr" x1="145" y1="300" x2="145" y2="324" marker-end="url(#arrow)"/>
  <line class="arr" x1="375" y1="300" x2="375" y2="324" marker-end="url(#arrow)"/>

  <rect x="40" y="324" width="210" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text class="th" x="145" y="348" text-anchor="middle" fill="#633806">4 · คนขับเริ่มจัดส่ง</text>
  <text class="ts" x="145" y="367" text-anchor="middle" fill="#854F0B">นำทาง เก็บ GPS รูป/ลายเซ็น/OTP</text>
  <rect x="270" y="324" width="210" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="6 4"/>
  <text class="th" x="375" y="348" text-anchor="middle" fill="#085041">ติดตามด้วยเลขพัสดุ</text>
  <text class="ts" x="375" y="367" text-anchor="middle" fill="#0F6E56">สำหรับออเดอร์ที่ออกทางไปรษณีย์</text>

  <line class="arr" x1="145" y1="380" x2="145" y2="404" marker-end="url(#arrow)"/>

  <rect x="40" y="404" width="210" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="th" x="145" y="428" text-anchor="middle" fill="#085041">5 · แอดมินตรวจและปิดงาน</text>
  <text class="ts" x="145" y="447" text-anchor="middle" fill="#0F6E56">ตรวจหลักฐานก่อนยืนยันส่งสำเร็จ</text>
  <rect x="270" y="404" width="210" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8" stroke-dasharray="6 4"/>
  <text class="th" x="375" y="428" text-anchor="middle" fill="#791F1F">ถ้าส่งไม่สำเร็จ</text>
  <text class="ts" x="375" y="447" text-anchor="middle" fill="#A32D2D">นัดส่งใหม่ · ส่งกลับ · ปิดเคส</text>
  <line class="arr" x1="250" y1="432" x2="270" y2="432" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <path class="arr" d="M145 460 L145 476 L260 476 L260 492" marker-end="url(#arrow)"/>

  <rect x="40" y="492" width="440" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text class="th" x="260" y="516" text-anchor="middle" fill="#3C3489">6 · แจ้งผลและเก็บประวัติการจัดส่ง</text>
  <text class="ts" x="260" y="535" text-anchor="middle" fill="#534AB7">อัปเดตสถานะให้ลูกค้าตั้งแต่รับออเดอร์จนส่งสำเร็จ</text>

  <rect x="500" y="160" width="140" height="300" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text class="th" x="512" y="184" fill="#3C3489">ลูกค้าติดตาม</text>
  <text class="th" x="512" y="203" fill="#3C3489">ได้ด้วยตัวเอง</text>
  <text class="ts" x="512" y="226" fill="#534AB7">ผ่านลิงก์ / QR</text>
  <line x1="512" y1="238" x2="628" y2="238" stroke="#AFA9EC" stroke-width="0.8"/>
  <text class="ts" x="512" y="262" fill="#534AB7">• รับออเดอร์แล้ว</text>
  <text class="ts" x="512" y="286" fill="#534AB7">• นัดวันจัดส่ง</text>
  <text class="ts" x="512" y="310" fill="#534AB7">• กำลังจัดส่ง</text>
  <text class="ts" x="520" y="328" fill="#534AB7">ดูตำแหน่งคนขับสด</text>
  <text class="ts" x="512" y="352" fill="#534AB7">• ส่งสำเร็จ + หลักฐาน</text>
  <line x1="512" y1="368" x2="628" y2="368" stroke="#AFA9EC" stroke-width="0.8"/>
  <text class="ts" x="512" y="392" fill="#534AB7">แสดงเฉพาะข้อมูล</text>
  <text class="ts" x="512" y="412" fill="#534AB7">ที่จำเป็น เช่น ชื่อต้น</text>

  <line class="arr" x1="480" y1="188" x2="500" y2="188" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <text class="ts" x="40" y="578" fill="#888780">เส้นประ = เส้นทางไปรษณีย์ไทย / กรณีส่งไม่สำเร็จ / มุมมองที่ลูกค้าเห็น</text>
</svg>
